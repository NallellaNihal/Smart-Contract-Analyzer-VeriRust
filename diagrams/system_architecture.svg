<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2f3a4a"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #172033; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #586275; }
      .box { fill: #ffffff; stroke: #2f3a4a; stroke-width: 2.2; rx: 8; }
      .core { fill: #eef6ff; stroke: #2467a7; }
      .output { fill: #f3fbf4; stroke: #2f7d45; }
      .process { fill: #fff8ea; stroke: #a56a11; }
      .text { font: 600 18px Arial, sans-serif; fill: #172033; }
      .small { font: 400 14px Arial, sans-serif; fill: #4d5768; }
      .arrow { stroke: #2f3a4a; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
      .lane { fill: #f7f9fc; stroke: #d5dce8; stroke-width: 1.5; rx: 8; }
      .lane-title { font: 700 16px Arial, sans-serif; fill: #344054; }
    </style>
  </defs>

  <rect width="1400" height="920" fill="#ffffff"/>
  <text x="700" y="56" text-anchor="middle" class="title">VeriRust System Architecture</text>
  <text x="700" y="88" text-anchor="middle" class="subtitle">Automated assertion injection, Kani verification, and LLVM coverage reporting for Rust contracts</text>

  <rect x="70" y="130" width="1260" height="160" class="lane"/>
  <text x="95" y="160" class="lane-title">Input and Orchestration</text>

  <rect x="105" y="185" width="210" height="68" class="box"/>
  <text x="210" y="214" text-anchor="middle" class="text">Rust Contract</text>
  <text x="210" y="237" text-anchor="middle" class="small">filename.rs or folder</text>

  <rect x="430" y="185" width="230" height="68" class="box core"/>
  <text x="545" y="214" text-anchor="middle" class="text">verify_rust.sh</text>
  <text x="545" y="237" text-anchor="middle" class="small">Pipeline controller</text>

  <rect x="785" y="185" width="230" height="68" class="box process"/>
  <text x="900" y="214" text-anchor="middle" class="text">Pre-cleanup</text>
  <text x="900" y="237" text-anchor="middle" class="small">Delete old temp artifacts</text>

  <rect x="1090" y="185" width="200" height="68" class="box process"/>
  <text x="1190" y="214" text-anchor="middle" class="text">Backup Source</text>
  <text x="1190" y="237" text-anchor="middle" class="small">filename.rs.bak</text>

  <path d="M315 219 H430" class="arrow"/>
  <path d="M660 219 H785" class="arrow"/>
  <path d="M1015 219 H1090" class="arrow"/>

  <rect x="70" y="335" width="1260" height="210" class="lane"/>
  <text x="95" y="365" class="lane-title">Instrumentation and Formal Verification</text>

  <rect x="105" y="405" width="230" height="76" class="box core"/>
  <text x="220" y="435" text-anchor="middle" class="text">rust_injector.py</text>
  <text x="220" y="459" text-anchor="middle" class="small">Scans if/while conditions</text>

  <rect x="445" y="405" width="260" height="76" class="box process"/>
  <text x="575" y="435" text-anchor="middle" class="text">Inject Assertions</text>
  <text x="575" y="459" text-anchor="middle" class="small">REACHABLE_TRUE / FALSE</text>

  <rect x="820" y="405" width="220" height="76" class="box"/>
  <text x="930" y="435" text-anchor="middle" class="text">Modified File</text>
  <text x="930" y="459" text-anchor="middle" class="small">contract_mod.txt</text>

  <rect x="1110" y="405" width="180" height="76" class="box core"/>
  <text x="1200" y="435" text-anchor="middle" class="text">Kani</text>
  <text x="1200" y="459" text-anchor="middle" class="small">Model checking</text>

  <path d="M1190 253 C1190 310 220 310 220 405" class="arrow"/>
  <path d="M335 443 H445" class="arrow"/>
  <path d="M705 443 H820" class="arrow"/>
  <path d="M1040 443 H1110" class="arrow"/>

  <rect x="70" y="590" width="1260" height="210" class="lane"/>
  <text x="95" y="620" class="lane-title">Reports and Coverage Artifacts</text>

  <rect x="105" y="660" width="220" height="76" class="box output"/>
  <text x="215" y="690" text-anchor="middle" class="text">kani_output.txt</text>
  <text x="215" y="714" text-anchor="middle" class="small">Verifier log</text>

  <rect x="410" y="660" width="250" height="76" class="box output"/>
  <text x="535" y="690" text-anchor="middle" class="text">SUMMARY.txt</text>
  <text x="535" y="714" text-anchor="middle" class="small">Reachability coverage</text>

  <rect x="745" y="660" width="245" height="76" class="box core"/>
  <text x="867" y="690" text-anchor="middle" class="text">cargo llvm-cov</text>
  <text x="867" y="714" text-anchor="middle" class="small">Branch coverage</text>

  <rect x="1080" y="640" width="210" height="112" class="box output"/>
  <text x="1185" y="676" text-anchor="middle" class="text">coverage_report/</text>
  <text x="1185" y="701" text-anchor="middle" class="small">index.html</text>
  <text x="1185" y="723" text-anchor="middle" class="small">LLVM_COVERAGE_SUMMARY.txt</text>

  <path d="M1200 481 C1200 575 215 575 215 660" class="arrow"/>
  <path d="M325 698 H410" class="arrow"/>
  <path d="M660 698 H745" class="arrow"/>
  <path d="M990 698 H1080" class="arrow"/>

  <rect x="380" y="812" width="640" height="82" class="box process"/>
  <text x="700" y="842" text-anchor="middle" class="text">Restore original source and delete generated temporary files</text>
  <text x="700" y="866" text-anchor="middle" class="small">*.out, *.json, *.kani-metadata*, *.symtab*, *.profraw, *.profdata, .llvm-cov/</text>
  <path d="M535 736 C535 790 700 790 700 830" class="arrow"/>
</svg>
